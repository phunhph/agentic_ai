repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: detect-private-key
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: block-sensitive-files-and-secrets
        name: Block sensitive files and simple secret patterns
        entry: python scripts/check_no_sensitive_staged.py
        language: system
        pass_filenames: false
