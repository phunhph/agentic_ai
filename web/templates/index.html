<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGENTIC CORE v3.5 | Enterprise AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;900&display=swap');
        :root { --bg: #0b1220; --card: #121a2b; --primary: #2563eb; --text-soft: #cbd5e1; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(10, 13, 20, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .trace-view-btn-active { background: rgba(59, 130, 246, 0.2); color: #bfdbfe; border-color: rgba(59, 130, 246, 0.4); }
        .graph-node { background: linear-gradient(135deg, rgba(15,23,42,.75), rgba(2,6,23,.8)); border: 1px solid rgba(148,163,184,.18); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <nav class="h-16 flex items-center justify-between px-8 glass border-b border-white/5 z-50">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-gradient-to-tr from-indigo-600 to-blue-400 rounded-xl flex items-center justify-center">
                <i class="fas fa-brain text-white text-lg"></i>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tighter uppercase italic">Agentic<span class="text-blue-500">Core</span> <span class="text-[10px] bg-white/10 px-2 py-0.5 rounded ml-2 not-italic text-gray-400">Enterprise v3.5</span></h1>
                <p class="text-[9px] text-gray-500 uppercase tracking-widest font-bold">Llama 3 Powered Autonomous Loop</p>
            </div>
        </div>
        <div id="roleIndicator" class="px-4 py-1.5 rounded-lg text-[10px] font-black tracking-widest uppercase border border-blue-400/30 bg-blue-500/10 text-blue-200">SESSION: AGENT</div>
    </nav>

    <main class="flex-grow flex p-6 gap-6 overflow-hidden">

        <!-- SIDEBAR: Control & Preview -->
        <aside class="w-[450px] flex flex-col gap-6">
            <div class="glass rounded-2xl p-6 flex flex-col gap-4">
                <div class="relative">
                    <textarea id="goalInput" class="w-full h-32 bg-black/60 border border-white/10 rounded-xl p-5 text-sm mono outline-none focus:border-blue-500/50 transition-all resize-none" placeholder="Lệnh cho Agent..."></textarea>
                </div>
                <button id="executeBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black text-xs py-4 rounded-xl shadow-xl shadow-blue-600/20 active:scale-[0.98] transition-all uppercase tracking-widest flex items-center justify-center gap-3">
                    <i class="fas fa-bolt"></i> <span>Execute Autonomous Loop</span>
                </button>
            </div>

            <div class="glass rounded-2xl p-6 flex-grow flex flex-col overflow-hidden border-t-2 border-blue-500/30" id="dbContainer">
                <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-4 flex justify-between items-center">
                    <span>Enterprise Data View</span>
                    <i class="fas fa-database text-blue-500"></i>
                </h2>
                <div id="dbView" class="flex-grow overflow-y-auto custom-scroll">
                    <div class="h-full flex flex-col items-center justify-center opacity-10">
                        <i class="fas fa-table text-4xl mb-4"></i>
                        <p class="text-[10px] font-bold">Awaiting Execution Results</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- TRACE: Reasoning & Logs -->
        <section class="flex-grow glass rounded-2xl flex flex-col overflow-hidden border-t-2 border-purple-500/20">
            <div class="h-12 flex items-center justify-between px-8 border-b border-white/5 bg-white/[0.01] gap-4">
                <span class="text-[10px] font-black uppercase tracking-widest text-gray-500 shrink-0">Traces (theo context)</span>
                <select id="traceThreadSelect" onchange="onTraceThreadChange(this.value)" class="flex-1 max-w-md text-[9px] mono bg-black/40 border border-white/10 rounded-lg px-2 py-1 text-gray-300 outline-none"></select>
                <div class="flex items-center gap-2 shrink-0">
                    <button id="traceViewLogsBtn" type="button" onclick="setTraceViewMode('logs')" class="text-[9px] font-bold text-gray-400 border border-white/10 px-2 py-1 rounded-lg uppercase">Logs</button>
                    <button id="traceViewGraphBtn" type="button" onclick="setTraceViewMode('graph')" class="text-[9px] font-bold text-gray-400 border border-white/10 px-2 py-1 rounded-lg uppercase">Graph</button>
                    <button type="button" onclick="newConversation()" class="text-[9px] font-bold text-gray-500 hover:text-amber-400 transition uppercase">New chat</button>
                    <button onclick="clearSystem()" class="text-[9px] font-bold text-gray-600 hover:text-red-400 transition uppercase">Clear</button>
                </div>
            </div>
            <div id="traceContent" class="flex-grow overflow-y-auto p-6 space-y-4 custom-scroll">
                <div id="traceEmptyState" class="max-w-md mx-auto text-center py-32 opacity-10">
                    <i class="fas fa-microchip text-6xl mb-4 text-purple-500"></i>
                    <p class="font-bold uppercase tracking-widest">System Ready</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        const FIXED_ROLE = 'BUYER';
        const chatHistory = [];
        /** @type {Record<string, object[]>} context_key -> logs */
        const traceByContext = {};
        let activeContextKey = null;
        let lastResults = [];
        const sessionId = createId();
        let conversationId = createId();
        const trace = document.getElementById('traceContent');
        const traceThreadSelect = document.getElementById('traceThreadSelect');
        const traceViewLogsBtn = document.getElementById('traceViewLogsBtn');
        const traceViewGraphBtn = document.getElementById('traceViewGraphBtn');
        const dbView = document.getElementById('dbView');
        const runBtn = document.getElementById('executeBtn');
        let traceViewMode = 'logs';

        function localContextKey() {
            return `${FIXED_ROLE}:${sessionId}:${conversationId}`;
        }

        function shortContextLabel(key) {
            if (!key) return '';
            const parts = String(key).split(':');
            if (parts.length >= 3) {
                const sid = (parts[1] || '').slice(0, 8);
                const cid = (parts[2] || '').slice(0, 8);
                return `${parts[0]} · ${sid}… · ${cid}…`;
            }
            return key.slice(0, 32);
        }

        function createId() {
            if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
            return `id-${Date.now()}-${Math.floor(Math.random() * 1e9)}`;
        }

        function clearSystem() {
            chatHistory.length = 0;
            Object.keys(traceByContext).forEach((k) => delete traceByContext[k]);
            activeContextKey = null;
            lastResults = [];
            trace.innerHTML = '';
            dbView.innerHTML = '';
            renderTraceThreadSelect();
        }

        function setTraceViewMode(mode) {
            traceViewMode = mode === 'graph' ? 'graph' : 'logs';
            traceViewLogsBtn.classList.toggle('trace-view-btn-active', traceViewMode === 'logs');
            traceViewGraphBtn.classList.toggle('trace-view-btn-active', traceViewMode === 'graph');
            renderTrace();
        }

        function buildTraceGraph(logs) {
            const flowBlocks = ['PERCEIVE', 'REASON', 'LEARN', 'POLICY', 'ACT', 'EVAL'];
            const colorByBlock = {
                PERCEIVE: 'text-cyan-300 border-cyan-400/35',
                REASON: 'text-amber-300 border-amber-400/35',
                LEARN: 'text-fuchsia-300 border-fuchsia-400/35',
                POLICY: 'text-orange-300 border-orange-400/35',
                ACT: 'text-rose-300 border-rose-400/35',
                EVAL: 'text-emerald-300 border-emerald-400/35'
            };
            const statusTone = { SUCCESS: 'text-emerald-300', DONE: 'text-emerald-300', DECIDED: 'text-blue-300', FAILED: 'text-rose-300', ERROR: 'text-rose-300', BLOCK: 'text-orange-300', BLOCKED: 'text-orange-300', RETRY: 'text-amber-300', NOT_FOUND: 'text-slate-300', CHECKING: 'text-indigo-300' };

            const iterations = {};
            const counters = {};
            let currentIteration = 0;
            logs.forEach((log) => {
                const content = String(log.content || '');
                if (log.block === 'TRACE' && content.includes('--- ITERATION')) {
                    const m = content.match(/ITERATION\s+(\d+)/i);
                    if (m) currentIteration = Number(m[1]);
                    if (!iterations[currentIteration]) iterations[currentIteration] = [];
                    return;
                }
                if (!flowBlocks.includes(log.block)) return;
                if (!iterations[currentIteration || 1]) iterations[currentIteration || 1] = [];
                counters[log.block] = (counters[log.block] || 0) + 1;
                const bucket = iterations[currentIteration || 1];
                const prev = bucket[bucket.length - 1];
                if (!prev || prev.block !== log.block) {
                    bucket.push({ block: log.block, status: (log.status || 'OK').toUpperCase(), content, count: 1 });
                } else {
                    prev.status = (log.status || prev.status || 'OK').toUpperCase();
                    prev.content = content || prev.content;
                    prev.count += 1;
                }
            });
            return { iterations, counters, colorByBlock, statusTone };
        }

        function newConversation() {
            conversationId = createId();
            activeContextKey = localContextKey();
            if (!traceByContext[activeContextKey]) {
                traceByContext[activeContextKey] = [];
            }
            renderTraceThreadSelect();
            renderTrace();
        }

        function renderTraceThreadSelect() {
            const bucket = traceByContext || {};
            const keys = Object.keys(bucket);
            traceThreadSelect.innerHTML = '';
            keys.forEach((k) => {
                const opt = document.createElement('option');
                opt.value = k;
                opt.textContent = shortContextLabel(k);
                traceThreadSelect.appendChild(opt);
            });
            const active = activeContextKey && keys.includes(activeContextKey)
                ? activeContextKey
                : (keys.length ? keys[keys.length - 1] : '');
            if (active) {
                traceThreadSelect.value = active;
                activeContextKey = active;
            }
        }

        function onTraceThreadChange(value) {
            activeContextKey = value || null;
            renderTrace();
        }

        runBtn.onclick = async () => {
            const goal = document.getElementById('goalInput').value;
            if (!goal) return;

            runBtn.disabled = true;
            runBtn.innerHTML = '<i class="fas fa-sync animate-spin"></i> <span>Processing...</span>';

            appendLog({
                block: 'SYSTEM',
                content: `Kích hoạt Agent Loop - Goal: ${goal}`,
                status: 'INIT',
                role: FIXED_ROLE,
                session_id: sessionId,
                conversation_id: conversationId,
                context_key: localContextKey(),
            });

            const formData = new FormData();
            formData.append('goal', goal);
            formData.append('role', FIXED_ROLE);
            formData.append('history', JSON.stringify(chatHistory || []));
            formData.append('session_id', sessionId);
            formData.append('conversation_id', conversationId);

            try {
                const response = await fetch('/run-agent', { method: 'POST', body: formData });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(l => l.startsWith('data: '));
                    for (const line of lines) {
                        const data = JSON.parse(line.replace('data: ', ''));
                        if (data.type === 'log') appendLog(data.log);
                        if (data.type === 'final') {
                            const ck = data.context_key || localContextKey();
                            activeContextKey = ck;
                            lastResults = data.final_result || [];
                            renderResults(lastResults);
                            chatHistory.push({ goal: goal, result: JSON.stringify(lastResults).substring(0, 200) });
                            renderTraceThreadSelect();
                        }
                    }
                }
            } catch (e) {
                appendLog({
                    block: 'SYSTEM',
                    content: 'Connection Error: ' + e.message,
                    status: 'FATAL',
                    role: FIXED_ROLE,
                    session_id: sessionId,
                    conversation_id: conversationId,
                    context_key: localContextKey(),
                });
            } finally {
                runBtn.disabled = false;
                runBtn.innerHTML = '<i class="fas fa-bolt"></i> <span>Execute Autonomous Loop</span>';
            }
        }

        function appendLog(log) {
            const ck = log.context_key || localContextKey();
            if (!traceByContext[ck]) traceByContext[ck] = [];
            traceByContext[ck].push(log);
            activeContextKey = ck;
            renderTraceThreadSelect();
            const showKey = activeContextKey || ck;
            if (showKey !== ck) return;
            appendLogCard(log);
        }

        function renderTrace() {
            trace.innerHTML = '';
            const bucket = traceByContext || {};
            const keys = Object.keys(bucket);
            let showKey = activeContextKey;
            if (!showKey || !bucket[showKey]) {
                showKey = keys.length ? keys[keys.length - 1] : null;
                activeContextKey = showKey;
            }
            renderTraceThreadSelect();
            const logs = showKey ? (bucket[showKey] || []) : [];
            if (!logs.length) {
                trace.innerHTML = `
                    <div class="max-w-md mx-auto text-center py-32 opacity-10">
                        <i class="fas fa-microchip text-6xl mb-4 text-purple-500"></i>
                        <p class="font-bold uppercase tracking-widest">System Ready</p>
                    </div>
                `;
                return;
            }
            if (traceViewMode === 'graph') {
                const { iterations, counters, colorByBlock, statusTone } = buildTraceGraph(logs);
                const iterationKeys = Object.keys(iterations).map(Number).sort((a, b) => a - b);
                if (!iterationKeys.length) {
                    trace.innerHTML = '<div class="p-8 text-center text-slate-400 text-[11px] italic uppercase tracking-widest">No graphable trace events.</div>';
                    return;
                }
                const chips = Object.keys(counters).map((block) =>
                    `<div class="px-2 py-1 rounded-lg bg-slate-900/70 border border-slate-700 text-[10px] mono text-slate-300">${block}: <span class="text-white">${counters[block]}</span></div>`
                ).join('');
                let html = `
                    <div class="mb-4 rounded-xl border border-white/10 bg-black/20 p-3">
                        <div class="text-[10px] uppercase tracking-widest text-slate-400 mb-2">Execution Graph</div>
                        <div class="flex flex-wrap gap-2">${chips}</div>
                    </div>
                `;
                iterationKeys.forEach((iter) => {
                    const nodes = iterations[iter] || [];
                    html += `
                        <div class="mb-4 rounded-xl border border-white/10 bg-slate-950/40 p-3">
                            <div class="mb-3 flex items-center justify-between">
                                <div class="text-[10px] uppercase tracking-widest text-slate-400">Iteration ${iter}</div>
                                <div class="text-[10px] mono text-slate-500">${nodes.length} nodes</div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-2">
                    `;
                    nodes.forEach((node) => {
                        const shortContent = String(node.content || '').slice(0, 90);
                        html += `
                            <div class="graph-node rounded-lg px-3 py-2 ${colorByBlock[node.block] || 'text-slate-200 border-slate-500/30'}">
                                <div class="flex items-center justify-between mb-1">
                                    <span class="text-[10px] font-black uppercase tracking-widest">${node.block}</span>
                                    <span class="text-[10px] mono ${statusTone[node.status] || 'text-slate-300'}">${node.status}</span>
                                </div>
                                <div class="text-[11px] text-slate-200 leading-relaxed">${shortContent}${String(node.content || '').length > 90 ? '…' : ''}</div>
                            </div>
                        `;
                    });
                    html += `
                            </div>
                        </div>
                    `;
                });
                trace.innerHTML = html;
                return;
            }
            logs.forEach((log) => appendLogCard(log));
        }

        function appendLogCard(log) {
            document.getElementById('traceEmptyState')?.remove();
            const div = document.createElement('div');
            const colors = { 'PERCEIVE': 'text-cyan-400', 'REASON': 'text-amber-400', 'ACT': 'text-red-400', 'EVAL': 'text-green-400', 'SYSTEM': 'text-purple-400', 'TRACE': 'text-violet-400', 'LEARN': 'text-fuchsia-400', 'POLICY': 'text-orange-400' };
            const bgs = { 'PERCEIVE': 'bg-cyan-400', 'REASON': 'bg-amber-400', 'ACT': 'bg-red-400', 'EVAL': 'bg-green-400', 'SYSTEM': 'bg-purple-400', 'TRACE': 'bg-violet-400', 'LEARN': 'bg-fuchsia-400', 'POLICY': 'bg-orange-400' };
            const roleTag = (log.role || FIXED_ROLE).toUpperCase();

            div.className = "glass p-4 rounded-xl animate-fade mb-3 border border-white/5";
            div.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[9px] font-black uppercase tracking-widest ${colors[log.block] || 'text-gray-400'} flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full ${bgs[log.block] || 'bg-gray-400'}"></span> ${log.block}
                    </span>
                    <span class="text-[8px] mono text-white/20 uppercase font-bold">
                        ${log.status || 'OK'} · <span class="text-blue-300">${roleTag}</span>
                        <span class="text-white/40" title="${log.context_key || ''}"> · ${(log.session_id || '').slice(0, 8)}</span>
                    </span>
                </div>
                <div class="text-[10px] mono text-white/25 mb-1 truncate" title="${log.context_key || ''}">${(log.context_key || '').slice(0, 48)}${(log.context_key || '').length > 48 ? '…' : ''}</div>
                <div class="text-[12px] text-slate-200 font-medium leading-relaxed">${log.content}</div>
            `;
            trace.appendChild(div);
            trace.scrollTop = trace.scrollHeight;
        }

        function renderResults(results) {
            const isDetailObject = (
                results &&
                !Array.isArray(results) &&
                typeof results === 'object' &&
                (
                    Array.isArray(results.items) ||
                    results.meta !== undefined
                )
            );

            if (isDetailObject) {
                const detail = results;
                const detailItems = Array.isArray(detail.items) ? detail.items : [];
                const meta = detail.meta && typeof detail.meta === 'object' ? detail.meta : {};
                const metaRows = Object.entries(meta).map(([k, v]) => {
                    const value = Array.isArray(v) ? v.join(', ') : (v ?? '-');
                    return `
                        <div class="bg-slate-800/70 rounded-lg px-2 py-1 text-slate-300">
                            <span class="text-slate-400">${k}:</span> ${value || '-'}
                        </div>
                    `;
                }).join('');

                const itemRows = detailItems.map((it) => `
                    <div class="bg-slate-800/70 rounded-lg px-3 py-2 text-slate-200 text-[11px]">
                        <div><span class="text-slate-400">item:</span> ${it.name ?? it.product ?? '-'}</div>
                        <div><span class="text-slate-400">quantity:</span> ${it.quantity ?? '-'}</div>
                        <div><span class="text-slate-400">value:</span> ${it.value ?? it.price ?? '-'}</div>
                    </div>
                `).join('');

                dbView.innerHTML = `
                    <div class="space-y-3">
                        <div class="bg-slate-900/70 p-4 rounded-xl border border-slate-700">
                            <div class="text-[10px] text-slate-400 mono">DETAIL</div>
                            <div class="text-sm font-semibold text-slate-100 mt-1">${detail.customer ?? '-'}</div>
                            <div class="mt-2 grid grid-cols-2 gap-2 text-[11px]">
                                <div class="bg-slate-800/70 rounded-lg px-2 py-1 text-slate-300"><span class="text-slate-400">contract_id:</span> ${detail.contract_id ?? '-'}</div>
                                <div class="bg-slate-800/70 rounded-lg px-2 py-1 text-slate-300"><span class="text-slate-400">status:</span> ${detail.status ?? '-'}</div>
                            </div>
                        </div>
                        <div class="bg-slate-900/70 p-4 rounded-xl border border-slate-700">
                            <div class="text-[10px] text-slate-400 uppercase mb-2">Items</div>
                            <div class="space-y-2">${itemRows || '<div class="text-slate-400 text-[11px]">No items</div>'}</div>
                        </div>
                        <div class="bg-slate-900/70 p-4 rounded-xl border border-slate-700">
                            <div class="text-[10px] text-slate-400 uppercase mb-2">Meta</div>
                            <div class="grid grid-cols-1 gap-2 text-[11px]">${metaRows || '<div class="text-slate-400">No meta</div>'}</div>
                        </div>
                    </div>
                `;
                return;
            }

            const normalizedResults = Array.isArray(results)
                ? results
                : (results && typeof results === 'object' ? [results] : []);

            if (!normalizedResults.length) {
                dbView.innerHTML = '<div class="p-8 text-center text-slate-400 text-[11px] italic uppercase tracking-widest">No matching records found.</div>';
                return;
            }

            let html = '';
            const first = normalizedResults[0];

            if (first.category && (first.account_count !== undefined || first.total_records !== undefined || first.product_count !== undefined)) {
                html = '<div class="space-y-4">';
                normalizedResults.forEach(i => {
                    html += `
                        <div class="bg-slate-900/60 border border-slate-700 p-4 rounded-xl">
                            <div class="text-[10px] font-black text-slate-300 uppercase mb-2">${i.category}</div>
                            <div class="flex justify-between items-end">
                                <div class="text-lg font-black text-white">${i.total_records ?? i.total_quantity ?? '-'} <span class="text-[9px] text-slate-400 uppercase">Records</span></div>
                                <div class="text-[11px] mono text-blue-300">${i.account_count ?? i.product_count ?? '-'} Accounts</div>
                            </div>
                        </div>`;
                });
                html += '</div>';
            } else if (first.contact_count !== undefined || first.opportunity_count !== undefined || first.contract_count !== undefined) {
                html = '<div class="grid grid-cols-1 gap-3">';
                normalizedResults.forEach(a => {
                    html += `
                        <div class="bg-slate-900/60 border border-slate-700 p-4 rounded-xl hover:bg-slate-900/90 transition-all group">
                            <div class="flex justify-between items-start gap-2 mb-2">
                                <div>
                                    <h4 class="text-sm font-semibold text-slate-100 group-hover:text-white">${a.name || '-'}</h4>
                                    <div class="text-[10px] text-slate-400 mono mt-0.5">${a.id || '-'}</div>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2 text-[11px]">
                                <div class="bg-slate-800/70 rounded-lg px-2 py-1 text-slate-300"><span class="text-slate-400">AM:</span> ${a.am_sales || '-'}</div>
                                <div class="bg-slate-800/70 rounded-lg px-2 py-1 text-slate-300"><span class="text-slate-400">BD:</span> ${a.bd_owner || '-'}</div>
                                <div class="bg-slate-800/70 rounded-lg px-2 py-1 text-slate-300"><span class="text-slate-400">Contacts:</span> ${a.contact_count ?? 0}</div>
                                <div class="bg-slate-800/70 rounded-lg px-2 py-1 text-slate-300"><span class="text-slate-400">Opportunities:</span> ${a.opportunity_count ?? 0}</div>
                                <div class="bg-slate-800/70 rounded-lg px-2 py-1 text-slate-300"><span class="text-slate-400">Contracts:</span> ${a.contract_count ?? 0}</div>
                                <div class="bg-slate-800/70 rounded-lg px-2 py-1 text-slate-300"><span class="text-slate-400">Website:</span> ${a.website || '-'}</div>
                            </div>
                            <div class="mt-2 text-[11px] text-slate-400"><span class="text-slate-500">Domain:</span> ${a.domain || '-'}</div>
                        </div>`;
                });
                html += '</div>';
            } else if (first.contract_id !== undefined) {
                html = '<div class="space-y-3">';
                normalizedResults.forEach(o => {
                    const statusColor = o.status === 'PENDING' ? 'text-amber-400' : 'text-green-400';
                    html += `
                        <div class="bg-slate-900/70 p-4 rounded-xl border border-slate-700 hover:border-slate-500 transition-all">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[10px] font-black text-blue-300 mono">CTR-#${o.contract_id}</span>
                                <span class="text-[10px] font-bold ${statusColor}">${o.status ?? 'N/A'}</span>
                            </div>
                            <div class="text-sm font-semibold text-slate-100 mb-1">${o.customer ?? '-'}</div>
                            <div class="flex justify-between items-center mt-3">
                                <span class="text-[10px] text-slate-400 mono">${String(o.date || '').split(' ')[0] || '-'}</span>
                                <span class="text-sm font-black text-white">${o.total != null ? o.total.toLocaleString() + 'đ' : '-'}</span>
                            </div>
                        </div>`;
                });
                html += '</div>';
            } else {
                html = '<div class="grid grid-cols-1 gap-3">';
                normalizedResults.forEach(p => {
                    html += `
                        <div class="bg-slate-900/60 border border-slate-700 p-4 rounded-xl hover:bg-slate-900/90 transition-all group">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-[10px] font-black text-slate-400 mono">${p.sku || '-'}</span>
                                <span class="text-sm font-black text-emerald-300">${p.price != null ? p.price.toLocaleString() + 'đ' : '-'}</span>
                            </div>
                            <h4 class="text-sm font-semibold text-slate-100 group-hover:text-white">${p.name || '-'}</h4>
                            <div class="mt-3 grid grid-cols-2 gap-2 text-[11px]">
                                <div class="bg-slate-800/70 rounded-lg px-2 py-1 text-slate-300"><span class="text-slate-400">Stock:</span> ${p.stock ?? 0}</div>
                                <div class="bg-slate-800/70 rounded-lg px-2 py-1 text-slate-300"><span class="text-slate-400">Category:</span> ${p.category || '-'}</div>
                            </div>
                        </div>`;
                });
                html += '</div>';
            }
            dbView.innerHTML = html;
        }

        renderTraceThreadSelect();
        setTraceViewMode('logs');
    </script>
</body>
</html>
