<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-6 space-y-6">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold">CRM Data Console</h1>
                <p class="text-slate-400 text-sm">CRUD trực tiếp trên các bảng chính</p>
            </div>
            <a href="/" class="text-sm px-3 py-2 rounded bg-slate-800 hover:bg-slate-700">Back to Agent UI</a>
        </div>

        <div class="grid grid-cols-12 gap-4">
            <div class="col-span-3 bg-slate-900 border border-slate-800 rounded-xl p-3">
                <h2 class="text-sm font-semibold mb-3">Tables</h2>
                <div id="tableList" class="space-y-1" data-tables='{{ tables|tojson|safe }}'></div>
            </div>
            <div class="col-span-9 space-y-4">
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-3">
                    <div class="flex items-center justify-between mb-3">
                        <h2 id="tableTitle" class="text-sm font-semibold">No table selected</h2>
                        <button id="reloadBtn" class="text-xs px-2 py-1 rounded bg-slate-800 hover:bg-slate-700">Reload</button>
                    </div>
                    <div class="overflow-auto max-h-[420px] border border-slate-800 rounded">
                        <table id="dataTable" class="min-w-full text-xs"></table>
                    </div>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-xl p-3 space-y-3">
                    <h2 class="text-sm font-semibold">Create / Update Payload (JSON)</h2>
                    <textarea id="jsonPayload" class="w-full h-40 bg-slate-950 border border-slate-800 rounded p-3 font-mono text-xs" placeholder='{"field":"value"}'></textarea>
                    <div class="flex gap-2">
                        <button id="createBtn" class="px-3 py-2 text-xs rounded bg-emerald-700 hover:bg-emerald-600">Create</button>
                        <button id="updateBtn" class="px-3 py-2 text-xs rounded bg-amber-700 hover:bg-amber-600">Update Selected</button>
                        <button id="deleteBtn" class="px-3 py-2 text-xs rounded bg-rose-700 hover:bg-rose-600">Delete Selected</button>
                    </div>
                    <p id="statusMsg" class="text-xs text-slate-300"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tableList = document.getElementById('tableList');
        const tableNames = JSON.parse(tableList.dataset.tables || '[]');
        const dataTable = document.getElementById('dataTable');
        const tableTitle = document.getElementById('tableTitle');
        const payloadInput = document.getElementById('jsonPayload');
        const statusMsg = document.getElementById('statusMsg');
        const reloadBtn = document.getElementById('reloadBtn');
        const createBtn = document.getElementById('createBtn');
        const updateBtn = document.getElementById('updateBtn');
        const deleteBtn = document.getElementById('deleteBtn');

        let selectedTable = null;
        let selectedPk = null;
        let selectedPkName = null;

        function setStatus(msg, isError = false) {
            statusMsg.textContent = msg;
            statusMsg.className = isError ? 'text-xs text-rose-300' : 'text-xs text-emerald-300';
        }

        function getPkName(row) {
            const keys = Object.keys(row || {});
            const idKey = keys.find(k => k.toLowerCase().endsWith('id'));
            return idKey || keys[0] || null;
        }

        async function loadTableData() {
            if (!selectedTable) return;
            tableTitle.textContent = selectedTable;
            const res = await fetch(`/api/tables/${selectedTable}`);
            const data = await res.json();
            const rows = data.rows || [];
            renderTable(rows);
        }

        function renderTable(rows) {
            if (!rows.length) {
                dataTable.innerHTML = '<tr><td class="p-3 text-slate-400">No data</td></tr>';
                selectedPk = null;
                return;
            }
            const columns = Object.keys(rows[0]);
            selectedPkName = getPkName(rows[0]);
            const thead = `<thead class="bg-slate-800"><tr>${columns.map(c => `<th class="text-left p-2">${c}</th>`).join('')}</tr></thead>`;
            const tbody = rows.map(r => {
                const pk = r[selectedPkName];
                const rowClass = String(pk) === String(selectedPk) ? 'bg-blue-900/40' : '';
                const safePk = String(pk).replace(/"/g, '&quot;');
                return `<tr class="border-t border-slate-800 cursor-pointer ${rowClass}" data-pk="${safePk}">${columns.map(c => `<td class="p-2">${r[c] ?? ''}</td>`).join('')}</tr>`;
            }).join('');
            dataTable.innerHTML = `${thead}<tbody>${tbody}</tbody>`;
            dataTable.querySelectorAll('tbody tr[data-pk]').forEach((tr) => {
                tr.addEventListener('click', () => selectRow(tr.getAttribute('data-pk')));
            });
        }

        window.selectRow = function(pk) {
            selectedPk = pk;
            loadTableData();
            setStatus(`Selected row: ${pk}`);
        }

        function renderTableButtons() {
            tableList.innerHTML = tableNames.map(t => `
                <button class="w-full text-left text-xs px-2 py-2 rounded ${t === selectedTable ? 'bg-blue-700 text-white' : 'bg-slate-800 hover:bg-slate-700'}"
                    data-table="${t}">${t}</button>
            `).join('');
            tableList.querySelectorAll('button[data-table]').forEach((btn) => {
                btn.addEventListener('click', () => selectTable(btn.getAttribute('data-table')));
            });
        }

        window.selectTable = function(tableName) {
            selectedTable = tableName;
            selectedPk = null;
            renderTableButtons();
            loadTableData();
        }

        function parsePayload() {
            try {
                return JSON.parse(payloadInput.value || '{}');
            } catch (e) {
                setStatus('Invalid JSON payload', true);
                return null;
            }
        }

        createBtn.onclick = async () => {
            if (!selectedTable) return setStatus('Select table first', true);
            const payload = parsePayload();
            if (!payload) return;
            const res = await fetch(`/api/tables/${selectedTable}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            const data = await res.json();
            if (!res.ok) return setStatus(data.detail || 'Create failed', true);
            setStatus('Created successfully');
            loadTableData();
        };

        updateBtn.onclick = async () => {
            if (!selectedTable || !selectedPk) return setStatus('Select row first', true);
            const payload = parsePayload();
            if (!payload) return;
            const res = await fetch(`/api/tables/${selectedTable}/${selectedPk}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            const data = await res.json();
            if (!res.ok) return setStatus(data.detail || 'Update failed', true);
            setStatus('Updated successfully');
            loadTableData();
        };

        deleteBtn.onclick = async () => {
            if (!selectedTable || !selectedPk) return setStatus('Select row first', true);
            const res = await fetch(`/api/tables/${selectedTable}/${selectedPk}`, { method: 'DELETE' });
            const data = await res.json();
            if (!res.ok) return setStatus(data.detail || 'Delete failed', true);
            setStatus('Deleted successfully');
            selectedPk = null;
            loadTableData();
        };

        reloadBtn.onclick = loadTableData;

        renderTableButtons();
        if (tableNames.length) selectTable(tableNames[0]);
    </script>
</body>
</html>
